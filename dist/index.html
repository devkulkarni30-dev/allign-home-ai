        @keyframes radar {
            0% { top: 0; opacity: 0; transform: scaleY(1); }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 100%; opacity: 0; transform: scaleY(0.5); }
        }
        .scan-line {
            height: 120px;
            background: linear-gradient(to bottom, transparent, rgba(59, 130, 246, 0.4), rgba(59, 130, 246, 0.1), transparent);
            position: absolute;
            left: 0;
            right: 0;
            z-index: 20;
            animation: radar 3s ease-in-out infinite;
            border-top: 1px solid rgba(59, 130, 246, 0.8);
            pointer-events: none;
        }
        .scan-grid {
            background-image: linear-gradient(to right, rgba(30, 41, 59, 0.5) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(30, 41, 59, 0.5) 1px, transparent 1px);
            background-size: 30px 30px;
            position: absolute;
            inset: 0;
            pointer-events: none;
            opacity: 0.2;
        }
        @keyframes pulse-grid {
            0%, 100% { opacity: 0.1; }
            50% { opacity: 0.4; }
        }
        .scan-grid-active {
            animation: pulse-grid 2s ease-in-out infinite;
        }
        @keyframes scan-move {
            0% { transform: translateY(0); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(100vh); opacity: 0; }
        }
        .animate-scan-line {
            animation: scan-move 4s linear infinite;
        }
        @keyframes ping-node {
            0% { transform: scale(0.5); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: scale(2.5); opacity: 0; }
        }
        .node-pulse {
            position: absolute;
            width: 8px;
            height: 8px;
            background: #10b981;
            border-radius: 50%;
            box-shadow: 0 0 15px #10b981;
            animation: ping-node 2s cubic-bezier(0, 0, 0.2, 1) infinite;
        }
        @keyframes corner-bracket {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 1; }
        }
        .corner-marker {
            position: absolute;
            width: 24px;
            height: 24px;
            border-color: #10b981;
            opacity: 0.8;
            animation: corner-bracket 1.5s ease-in-out infinite;
        }
        .corner-tl { top: 20px; left: 20px; border-top-width: 2px; border-left-width: 2px; }
        .corner-tr { top: 20px; right: 20px; border-top-width: 2px; border-right-width: 2px; }
        .corner-bl { bottom: 20px; left: 20px; border-bottom-width: 2px; border-left-width: 2px; }
        .corner-br { bottom: 20px; right: 20px; border-bottom-width: 2px; border-right-width: 2px; }

        @keyframes boundary-trace {
            0% { stroke-dashoffset: 1000; }
            100% { stroke-dashoffset: 0; }
        }
        @keyframes dash {
            to {
                stroke-dashoffset: 0;
            }
        }
        .boundary-path {
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            animation: boundary-trace 10s linear infinite;
        }

        .vastu-chakra {
            pointer-events: none;
            opacity: 0.4;
            mix-blend-mode: overlay;
        }
